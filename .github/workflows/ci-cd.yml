name: Backend CI/CD

on:
  pull_request:
    branches: [ '*', 'develop', 'main' ]
  push:
    branches: [ 'develop', 'main' ]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        run: mvn test

  build-and-deploy:
    if: github.event_name == 'push'
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test

      - name: Build Docker image
        run: |
          docker build -t petmatch-backend:latest .
          docker tag petmatch-backend:latest petmatch-backend:${{ github.sha }}

      - name: Deploy to server
        run: |
          # Stop the old container
          docker-compose -f /opt/petmatch/docker-compose.yml stop petmatch-service || true
          docker-compose -f /opt/petmatch/docker-compose.yml rm -f petmatch-service || true
          
          # Update docker image version
          docker tag petmatch-backend:latest petmatch-backend:current
          
          # Run image with new version
          docker-compose -f /opt/petmatch/docker-compose.yml up -d petmatch-service
          
          # Clean up old versions
          docker image prune -f