name: Backend CI/CD

on:
  pull_request:
    branches: [ '*', 'develop', 'master' ]
  push:
    branches: [ 'develop', 'master' ]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests
        run: ./mvnw test

  build-and-deploy:
    # if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master')
    if: github.event_name == 'pull_request'
    runs-on: deployment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test

      - name: Build application
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: petmatch-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate and fix tag
        id: fix-tag
        run: |
          TAG="${{ steps.meta.outputs.tags }}"
          echo "Original tags: $TAG"
          # Убираем пустые строки, пробелы и берем первый валидный тег
          VALID_TAG=$(echo "$TAG" | grep -v '^$' | head -n1 | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          # Если тег начинается с двоеточия, убираем его
          if [[ "$VALID_TAG" == *":"* ]]; then
            VALID_TAG=$(echo "$VALID_TAG" | sed 's/^://')
          fi
          # Если тег пустой, используем fallback
          if [[ -z "$VALID_TAG" ]]; then
            if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
              VALID_TAG="develop-${{ github.sha }}"
            elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
              VALID_TAG="master-${{ github.sha }}"
            else
              VALID_TAG="latest"
            fi
          fi
          echo "Fixed tag: $VALID_TAG"
          echo "tag=$VALID_TAG" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: petmatch-backend:${{ steps.fix-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          script: |
            cd /opt/petmatch
            export BACKEND_IMAGE_TAG=${{ steps.fix-tag.outputs.tag }}
            echo "Deploying with tag: ${{ steps.fix-tag.outputs.tag }}"
            ./deploy.sh ${{ steps.fix-tag.outputs.tag }} production